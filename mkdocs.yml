site_name: Biology Problems OER
docs_dir: site_docs
theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      accent: lime
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      accent: lime
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - content.footer
    - navigation.path
    - navigation.indexes
    - navigation.top

markdown_extensions:
- attr_list
- md_in_html

plugins:
- search
- include-markdown

extra_css:
  - assets/stylesheets/custom.css
  - assets/stylesheets/daily_puzzle.css

extra_javascript:
  - assets/scripts/custom.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/vosslab
      name: GitHub
    - icon: fontawesome/brands/youtube
      link: https://www.youtube.com/neilvosslab
      name: YouTube
    - icon: fontawesome/brands/bluesky
      link: https://bsky.app/profile/neilvosslab.bsky.social
      name: Bluesky
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/vosslab
      name: LinkedIn
    - icon: fontawesome/brands/facebook
      link: https://www.facebook.com/neilvosslab
      name: Facebook
    - icon: fontawesome/brands/patreon
      link: https://www.patreon.com/vosslab
      name: Patreon
    - icon: fontawesome/brands/paypal
      link: https://paypal.me/vosslab
      name: PayPal
  generator: false

copyright: >
  &copy; 2024-2025 Dr. Neil Voss * Licensed under
  <a href="https://creativecommons.org/licenses/by-sa/4.0/" target="_blank" rel="noopener">
